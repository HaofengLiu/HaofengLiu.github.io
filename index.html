<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人简历</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        background-color: #f0f0f0;
    }
    .left-side {
        width: 20%; 
        background-color: #fff;
        padding: 20px;
        padding-bottom: 20px; /* 添加一个内边距来容纳底部链接 */
        padding-left: 40px; /* 增加左侧内边距 */
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        position: fixed;
        height: 100%;
        overflow: auto;
        display: flex; /* 使 .left-side 成为一个 flex 容器 */
        flex-direction: column; /* 设置 flex 方向为 column */
        left: 310px; /* 添加左外边距来创建左侧的空间 */
    }
    .right-side {
        width: 40%; /* 更新宽度以保证它不被左侧区域遮挡 */
        margin-left: 40%; /* 使得右侧区域与左侧区域紧密相邻但不重叠 */
        background-color: #fff;
        padding: 20px;
        padding-right: 40px; /* 增加右侧内边距 */
        box-shadow: -2px 0 5px rgba(0, 0, 0, 0.1);
        overflow: auto;
        right: 300px;
    }
    .profile-pic {
        width: 200px; /* 调整宽度 */
        height: 250px; /* 调整高度 */
        border-radius: 0; /* 移除圆角 */
        display: block;
        margin: 0 auto 20px auto;
    }
    .name {
        text-align: center;
        font-size: 24px;
        margin: 10px 0;
    }
    .statement {
        text-align: center;
        font-size: 16px;
        margin: 10px 0;
    }
    .section {
        margin: 20px 0;
    }
    .section h2 {
        font-size: 20px;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 10px;
        margin-bottom: 10px;
    }
    .section p, .section ul {
        margin: 10px 0;
    }
    .section ul {
        list-style-type: none;
        padding: 0;
    }
    .section ul li {
        margin: 10px 0;
    }
    .footer {
        margin-top: auto; /* 将 .footer 推到底部 */
        margin-bottom: 40px; /* 添加一些底部边距以防止链接消失 */
        text-align: center;
    }
        .increased-line-height {
        line-height: 2.5; /* 2.5 是行高的倍数，可以根据需要调整 */
    }
    .image-row {
        display: flex;
        justify-content: space-around; /* 或者可以使用 space-between */
    }

    .linked-image {
        width: 120px; /* 你可以根据需要设置适当的宽度 */
        height: 60px; /* 确保高度与宽度相同，以保持图片的方形 */
        margin: 0 10px; /* 这会在每张图片的左右两侧各添加10px的空间 */
    }
</style>
</head>
<body>

<div class="left-side">
    <img src="/Files/photo.jpg" alt="头像" class="profile-pic">
    <div class="increased-line-height">
        <div class="name"><b>刘昊峰</b></div>
    </div>
    <div class="statement">在读博士生</div>
    <div class="statement">英国曼彻斯特大学</div>
    <div class="statement"><b>研究领域</b>：非正交多址接入，雷达通信一体化，<br>信号处理，系统优化</div>
    <div class="section">
        <h2>联系方式</h2>
        <p>Email: <a href="mailto:haofeng.liu@postgrad.manchester.ac.uk">haofeng.liu@postgrad.manchester.ac.uk</a></p>
    </div>

    <div class="image-row">
        <a href="https://scholar.google.co.uk/citations?user=vhVnJGsAAAAJ&hl=en&oi=sra" target="_blank">
            <img src="/Files/Google.png" alt="图片1描述" class="linked-image">
        </a>
        <a href="https://www.linkedin.com/in/haofeng-liu/" target="_blank">
            <img src="/Files/Linkin.png" alt="图片2描述" class="linked-image">
        </a>
        <a href="https://github.com/HaofengLiu" target="_blank">
            <img src="/Files/Github.png" alt="图片3描述" class="linked-image">
        </a>
    </div>
    
    <div class="footer">
        <a href="index-en.html">English Version</a>
    </div>
</div>

    
<div class="right-side">
    <div class="section">
        <h2>教育经历</h2>
        <ul>
            <li>大学名称 - 学位 - 时间段</li>
            <li>学校名称 - 学历 - 时间段</li>
            <!-- 你可以按照上述格式添加更多的教育经历 -->
        </ul>
    </div>

    <div class="section">
        <h2>发表的文章</h2>
        <ul>
            <li><a href="#article1-link-here">文章标题1</a> - 发表时间1</li>
            <li><a href="#article2-link-here">文章标题2</a> - 发表时间2</li>
            <!-- 你可以按照上述格式添加更多的文章链接 -->
        </ul>
    </div>
</div>

</body>
</html>
